# Rule name — a descriptive label for this import rule
name: "My Bank Checking"

# Column separator character (common: "," for CSV, "\t" for TSV)
separator: ","

# File encoding (usually utf-8; some banks use latin-1 or cp1252)
encoding: "utf-8"

# Number of header/footer lines to skip before data begins / at the end
skip_lines_start: 0
skip_lines_end: 0

# Date format using Python strftime tokens
# Examples: "%Y-%m-%d" (2024-01-15), "%m/%d/%Y" (01/15/2024), "%d/%b/%Y" (15/Jan/2024)
date_format: "%Y-%m-%d"

# Decimal separator ("." for most locales, "," for some European formats)
decimal_separator: "."

# Column index mappings (0-based — open your CSV and count columns starting from 0)
columns:
  date: 0
  # Use 'amount' for a single amount column:
  amount: 1
  # OR use separate debit/credit columns (uncomment below, remove 'amount' above):
  # amount_debit: 1
  # amount_credit: 2
  payee: 2
  narration: 3
  # memo: 4

# Beancount account that this bank statement belongs to
default_account: "Assets:Bank:Checking"

# Currency for transactions
default_currency: "USD"

# Set to true if your bank shows debits as positive (e.g. credit card statements)
negate_amounts: false
