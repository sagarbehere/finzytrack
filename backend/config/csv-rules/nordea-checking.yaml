# CSV import rule for Nordea (Sweden) checking account
#
# Nordea exports use semicolons as separators and commas as decimal separators
# (European format). Each line has a trailing semicolon which creates an extra
# empty column — this is harmless.
#
# Columns: Booking date, Amount, Sender, Recipient, Name, Title, Balance, Currency
#          0             1       2       3          4     5      6        7

name: "Nordea Bank"
separator: ";"
encoding: "utf-8"
skip_lines_start: 1    # Header row
skip_lines_end: 0
date_format: "%Y/%m/%d"
decimal_separator: ","
negate_amounts: false

columns:
  date: 0
  amount: 1
  payee: 5

default_account: "Assets:Nordea:Checking"
default_currency: "SEK"
