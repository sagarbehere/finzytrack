name: "Axis Bank NRO"
separator: ","
encoding: "utf-8"
skip_lines_start: 17   # Row 18 contains column headers (counting from top)
skip_lines_end: 28     # Footer rows with legal text and disclaimers
date_format: "%d-%m-%Y"
decimal_separator: "."
negate_amounts: false
columns:
  date: 2              # Tran Date
  memo: 3              # CHQNO (reference number, though mostly dashes)
  payee: 4             # PARTICULARS (transaction description)
  amount_debit: 5      # DR column
  amount_credit: 6     # CR column
default_account: "Assets:AxisBank:NRO"
default_currency: "INR"