# CSV import rule for Optum Health HSA account
#
# Optum exports use standard quoted CSV. Amounts have a $ prefix
# (e.g., -$35.00, $0.15) which the parser strips automatically.
#
# Columns: Date, Type, Description, Status, Amount
#          1     2     3            4       5

name: "Optum Health HSA"
separator: ","
encoding: "utf-8"
skip_lines_start: 1    # Header row
skip_lines_end: 0
date_format: "%Y-%m-%d"
decimal_separator: "."
negate_amounts: false

columns:
  date: 1
  amount: 5
  payee: 3

default_account: "Assets:Optum:HSA"
default_currency: "USD"
