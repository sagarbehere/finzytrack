# CSV import rule for Bank of America checking account
#
# BofA CSV exports have a 5-line summary section at the top,
# followed by a blank line, then the transaction header and data.
# The first data row is a "Beginning balance" line with no amount,
# which the parser auto-skips due to the empty amount field.
#
# Columns: Date, Description, Amount, Running Bal.
#          1     2             3       4

name: "Bank of America"
separator: ","
encoding: "utf-8"
skip_lines_start: 6    # 5 summary rows + 1 transaction header
skip_lines_end: 0
date_format: "%m/%d/%Y"
decimal_separator: "."
negate_amounts: false

columns:
  date: 1
  payee: 2
  amount: 3

default_account: "Assets:BofA:Checking"
default_currency: "USD"
