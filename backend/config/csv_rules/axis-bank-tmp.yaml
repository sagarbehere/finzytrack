# CSV import rule for Axis Bank NRE Savings account (India)
#
# Axis Bank CSV exports have a long header section with account holder info
# (name, address, PAN, IFSC, etc.), followed by a statement period line,
# then the transaction data, and finally a long disclaimer/legend footer.
#
# The footer lines don't have valid dates in column 0, so the parser
# auto-filters them — no skip_lines_end needed.
#
# This bank uses separate Debit (DR) and Credit (CR) columns instead of
# a single amount column.
#
# Columns: Tran Date, CHQNO, PARTICULARS, DR, CR, BAL, SOL
#          1          2      3             4   5   6    7

name: "Axis Bank Tmp"
separator: ","
encoding: "utf-8"
skip_lines_start: 1   # column header only
skip_lines_end: 0
date_format: "%m/%d/%Y"
decimal_separator: "."
negate_amounts: false

columns:
  date: 1
  payee: 3
  amount_debit: 4
  amount_credit: 5
  memo: 2

default_account: "Assets:AxisBank:NRO"
default_currency: "INR"
