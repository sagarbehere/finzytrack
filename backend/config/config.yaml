# Finzytrack Backend Configuration

# File paths
ledger_file: "./data/ledgers/one.beancount"

# Account settings
accounts:
  default_currency: "USD"
  default_unknown_account: "Expenses:Unknown"

# Server settings
server:
  host: "127.0.0.1"
  port: 8001


# AI settings (categorization and model)
ai:
  categorization:
    enabled: true
    engine: "classifier"  # "classifier" (scikit-learn) or "ai" (requires ai.llm to be configured)
    training_data_file: "./data/ledgers/one.beancount"  # training data comes from the main ledger
  llm:
    provider: "openai"  # "openai" (any OpenAI-compatible endpoint: LM Studio, Ollama, OpenAI, Groq, etc.) or "anthropic" (Anthropic API directly)
    api_url: ""         # Only used when provider=openai — e.g. http://127.0.0.1:1234 or https://api.openai.com (leave empty for default OpenAI endpoint)
    api_key: ""         # Required for cloud providers (OpenAI, Anthropic, Groq, etc.), leave empty for local LLMs
    model: ""           # e.g. gpt-4o, claude-sonnet-4-6, llama-3.1-8b-instruct
    temperature: 0.1    # Low = more deterministic (recommended for parsing/SQL)
    max_tokens: 0       # 0 = use model default. Anthropic requires a value > 0 (falls back to 8192 with a warning).
    max_tool_rounds: 12  # Max tool-call round-trips per user message in the assistant
    timeout_secs: 120    # Timeout in seconds for LLM API requests

# Backup settings
backup:
  enabled: true
  retention_count: 100

# Logging
logging:
  level: "INFO"
  max_file_size_mb: 5      # Max log file size in MB before rotation
  backup_count: 3           # Number of rotated log files to keep

# Email import (IMAP fetch + rule-based parsing)
email_import:
  enabled: true                           # Set to false to disable email import endpoints
  default_lookback_days: 7                 # Default days to look back for emails
  max_emails: 500                          # Max emails per fetch; truncates with warning
  imap_timeout_secs: 30                    # Socket timeout for IMAP operations; 0 = no timeout
  parsing_mode: "regex"                    # Default: "regex" or "ai" (uses ai.llm config above)

