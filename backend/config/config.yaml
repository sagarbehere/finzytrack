# Finzytrack Backend Configuration

# File paths
ledger_file: "./data/ledgers/one.beancount"

# Account settings
accounts:
  default_currency: "USD"
  default_unknown_account: "Expenses:Unknown"

# Server settings
server:
  host: "127.0.0.1"
  port: 8001

# CSV import rules directory
csv_rules_dir: "./config/csv-rules"

# OFX account mappings file (populated via "Learn Account" feature)
ofx_mappings_file: "./config/ofx_mappings.yaml"


# Machine Learning settings
ml:
  enabled: false
  training_data_file: "./data/training.beancount"

# Feature flags
features:
  duplicate_detection: true
  auto_categorization: true

# Backup settings
backup:
  enabled: true
  backup_dir: "./data/backups"
  retention_count: 100
  cleanup_on_exceed: true

# Logging
logging:
  level: "INFO"
  file: "./logs/finzytrack.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Security settings
security:
  # List of allowed CORS origins for the frontend
  cors_origins:
    - "http://127.0.0.1:3000"
    - "http://localhost:3000"

# Analytics Configuration
analytics:
  # DuckDB export settings
  duckdb:
    export_path: "./data/ledger.duckdb"
    auto_sync_enabled: true
    sync_debounce_seconds: 5.0

  # SQLite export settings
  sqlite:
    export_path: "./data/ledger.db"
    auto_sync_enabled: true
    sync_debounce_seconds: 5.0
    enable_wal: true  # Enable WAL mode for concurrent access

  # Metabase analytics settings
  metabase:
    db_type: "duckdb"  # Database type: "duckdb" or "sqlite"
    version: "0.50.0"
    port: 3002
    auto_start: true
    jar_path: "resources/metabase/metabase.jar"
    plugins_dir: "resources/metabase/plugins"
    data_dir: "resources/metabase/data"
    dashboard_templates_dir: "resources/metabase-templates"
    java_heap_size: "2g"
    java_opts: "--add-opens java.base/java.nio=ALL-UNNAMED"
    initialized: false
    admin_email: "admin@finzytrack.local"
    admin_password: ""
    session_token: ""
    database_id: null

    # Field metadata configuration (optional)
    # Set to null to disable field metadata configuration
    # For SQLite: use "resources/metabase-templates/sqlite-field-metadata.json"
    field_metadata_config: null
