# Finzytrack Backend Configuration

# File paths
ledger_file: "./data/ledgers/one.beancount"

# Account settings
accounts:
  default_currency: "USD"
  default_unknown_account: "Expenses:Unknown"

# Server settings
server:
  host: "127.0.0.1"
  port: 8001

# CSV import rules directory
csv_rules_dir: "./config/csv-rules"

# OFX account mappings file (populated via "Learn Account" feature)
ofx_mappings_file: "./config/ofx_mappings.yaml"


# AI settings (categorization and LLM)
ai:
  categorization:
    enabled: false
    engine: "classifier"  # "classifier" (scikit-learn) or "llm" (future, requires ai.llm to be configured)
    training_data_file: "./data/training.beancount"  # used when engine=local
  llm:
    api_url: ""       # OpenAI-compatible endpoint, e.g. http://127.0.0.1:1234 or https://api.openai.com
    api_key: ""       # Required for cloud providers (OpenAI, Groq, etc.), leave empty for local LLMs
    model: ""         # e.g. gpt-4o, llama-3.1-8b-instruct, openai/gpt-oss-20b
    temperature: 0.1  # Low = more deterministic (recommended for parsing/SQL)
    max_tokens: 2048

# Feature flags
features:
  duplicate_detection: true
  auto_categorization: true

# Backup settings
backup:
  enabled: true
  backup_dir: "./data/backups"
  retention_count: 100
  cleanup_on_exceed: true

# Logging
logging:
  level: "INFO"
  file: "./logs/finzytrack.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Security settings
security:
  # List of allowed CORS origins for the frontend
  cors_origins:
    - "http://127.0.0.1:3000"
    - "http://localhost:3000"

# Analytics Configuration
analytics:
  # SQLite export settings
  sqlite:
    export_path: "./data/ledger.db"
    auto_sync_enabled: true
    sync_debounce_seconds: 5.0
    enable_wal: true  # Enable WAL mode for concurrent access
