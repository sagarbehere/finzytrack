metadata:
  name: "ICICI Current Account"
  beancount_account: "Assets:Liquid:Checking:ICICI"
  default_currency: "INR"
  institution: "ICICI Bank"
  description: "ICICI Bank current account transaction alerts (Finalert SMS forwards)"
  version: "1.0"

imap_server:
  server: "imap.example.com"
  port: 993
  username: "${IMAP_USERNAME}"
  password: "${IMAP_PASSWORD}"
  folder: "Finalerts"

lookback_days: 7
bank_emails:
  - "alerts@example.com"    # your forwarded-alerts mailbox

body_keyword: "XX1234"

parsing_mode: "regex"

transaction_types:
  - name: "Finalert_Debit"
    description: "Debit transactions reported via SMS-forwarded Finalert emails"
    email_filter:
      subject_regex: "Finalert"
      body_regex: 'XX1234'
    extraction:
      amount:
        # Matches: "Rs. 9,778.83" or "Rs 500.00"
        pattern: 'Rs\.?\s*([\d,]+\.\d{2})'
        type: "float"
        source: "body"
        cleanup: "remove_commas"
      payee_raw:
        # Matches: "on 25-Mar-26 VIN*CLAUDE AI." — payee is between date and period/". Bal"
        pattern: 'on \d{2}-[A-Za-z]{3}-\d{2}\s+(.+?)\.\s'
        type: "string"
        source: "body"
        cleanup: "strip_whitespace"
        optional: true
      timestamp:
        # Matches: "on 25-Mar-26"
        pattern: 'on (\d{2}-[A-Za-z]{3}-\d{2})'
        type: "datetime"
        source: "body"
        format: "%d-%b-%y"
        timezone: "+05:30"
      masked_account:
        # Matches: "Acc XX1234"
        pattern: 'Acc\s+(XX\d+)'
        type: "string"
        source: "body"
        optional: true
    mapping:
      payee_raw: "payee"
      timestamp: "date"
      amount: "amount"
    amount_sign:
      field: "fixed"
      value: "negative"    # Finalert debited = payment made
    error_handling:
      required_fields: ["amount", "timestamp"]
      partial_match_allowed: true
