metadata:
  name: "Axis Bank NRO"
  beancount_account: "Assets:Liquid:Savings:AxisBank:NRO"
  default_currency: "INR"
  institution: "Axis Bank"
  description: "Axis Bank savings account transaction alerts"
  version: "1.0"

imap_server:
  server: "imap.fastmail.com"
  port: 993
  username: "${FASTMAIL_EMAIL_USERNAME}"    # EDIT: set env var, e.g. export FASTMAIL_EMAIL_USERNAME=you@gmail.com
  password: "${FASTMAIL_EMAIL_PASSWORD}"    # EDIT: set env var, e.g. export FASTMAIL_EMAIL_PASSWORD=your-app-password
  folder: "Finalerts"

lookback_days: 7

bank_emails:
  - "alerts@axis.bank.in"

body_keyword: "XX8968"  # server-side IMAP pre-filter; only fetch emails mentioning this account

transaction_types:

  - name: "UPI_Debit"
    description: "UPI debit transactions (P2M, P2P)"
    email_filter:
      subject_regex: "was debited from your"
      body_regex: 'XX8968'
    extraction:
      amount:
        pattern: 'Amount Debited:\s+INR ([\d,]+\.\d+)'
        type: "float"
        cleanup: "remove_commas"
      timestamp:
        pattern: 'Date & Time:\s+(\d{2}-\d{2}-\d{2}, \d{2}:\d{2}:\d{2}) IST'
        type: "datetime"
        format: "%d-%m-%y, %H:%M:%S"
        timezone: "+05:30"
      reference:
        pattern: 'UPI/P2[A-Z]/([0-9]+)/'
        type: "string"
        optional: true
      payee_raw:
        pattern: 'UPI/P2[A-Z]/[0-9]+/([^/\n]+)'
        type: "string"
        cleanup: "strip_whitespace"
        optional: true
      masked_account:
        pattern: 'Account Number:\s+(XX\w+)'
        type: "string"
        optional: true
    mapping:
      reference: "external_id"
      external_id_type: "UPI"
      payee_raw: "payee"
      timestamp: "date"
      amount: "amount"
    amount_sign:
      field: "fixed"
      value: "negative"
    error_handling:
      required_fields: ["amount", "timestamp"]
      partial_match_allowed: true

  - name: "UPI_Credit"
    description: "UPI credit transactions (P2A, P2P)"
    email_filter:
      subject_regex: "was credited to your"
      body_regex: 'XX8968'
    extraction:
      amount:
        pattern: 'Amount Credited:\s+INR ([\d,]+\.\d+)'
        type: "float"
        cleanup: "remove_commas"
      timestamp:
        pattern: 'Date & Time:\s+(\d{2}-\d{2}-\d{2}, \d{2}:\d{2}:\d{2}) IST'
        type: "datetime"
        format: "%d-%m-%y, %H:%M:%S"
        timezone: "+05:30"
      reference:
        pattern: 'UPI/P2[A-Z]/([0-9]+)/'
        type: "string"
        optional: true
      payee_raw:
        pattern: 'UPI/P2[A-Z]/[0-9]+/([^/\n]+)'
        type: "string"
        cleanup: "strip_whitespace"
        optional: true
      masked_account:
        pattern: 'Account Number:\s+(XX\w+)'
        type: "string"
        optional: true
    mapping:
      reference: "external_id"
      external_id_type: "UPI"
      payee_raw: "payee"
      timestamp: "date"
      amount: "amount"
    amount_sign:
      field: "fixed"
      value: "positive"
    error_handling:
      required_fields: ["amount", "timestamp"]
      partial_match_allowed: true

  - name: "NEFT_Debit"
    description: "NEFT/RTGS debit transactions"
    email_filter:
      subject_regex: "Debit transaction alert"
      body_regex: 'XX8968'
    extraction:
      amount:
        pattern: 'debited with INR ([\d,]+\.\d+)'
        type: "float"
        cleanup: "remove_commas"
      timestamp:
        pattern: 'debited with INR [\d,.]+ on (\d{2}-\d{2}-\d{4} \d{2}:\d{2}:\d{2}) IST'
        type: "datetime"
        format: "%d-%m-%Y %H:%M:%S"
        timezone: "+05:30"
      reference:
        # Format: NEFT/IR/AXOIR06800923035/S — capture the reference number
        pattern: 'NEFT/(?:IR|OB)/([A-Z0-9]+)/'
        type: "string"
        optional: true
      masked_account:
        pattern: 'A/c no\.\s+(XX\w+)'
        type: "string"
        optional: true
    mapping:
      reference: "external_id"
      external_id_type: "NEFT"
      timestamp: "date"
      amount: "amount"
    amount_sign:
      field: "fixed"
      value: "negative"
    error_handling:
      required_fields: ["amount", "timestamp"]
      partial_match_allowed: true
    # NOTE: Axis Bank NEFT debit alerts do not include the recipient name in the email body.
    # Payee will be blank — fill it in manually in the import review table.

  - name: "NEFT_Credit"
    description: "NEFT/self-transfer credit transactions (subject: 'Credit transaction alert')"
    email_filter:
      subject_regex: "Credit transaction alert"
      body_regex: 'XX8968'
    extraction:
      amount:
        pattern: 'credited with INR ([\d,]+\.\d+)'
        type: "float"
        cleanup: "remove_commas"
      timestamp:
        # Format: "on 21-03-2026 at 18:02:18 IST"
        pattern: 'on (\d{2}-\d{2}-\d{4} at \d{2}:\d{2}:\d{2}) IST'
        type: "datetime"
        format: "%d-%m-%Y at %H:%M:%S"
        timezone: "+05:30"
      payee_raw:
        # Format: "by MOB/SELFFT/SAGAR MORESHWAR" or "by NEFT/IR/SENDER NAME"
        pattern: 'by \w+/\w+/([^\n.]+)'
        type: "string"
        cleanup: "strip_whitespace"
        optional: true
      masked_account:
        pattern: 'A/c no\.\s+(XX\w+)'
        type: "string"
        optional: true
    mapping:
      payee_raw: "payee"
      timestamp: "date"
      amount: "amount"
    amount_sign:
      field: "fixed"
      value: "positive"
    error_handling:
      required_fields: ["amount", "timestamp"]
      partial_match_allowed: true
