# Example CSV import rule shipped with FinzyTrack. Treat every field as a
# starting point — review and adapt to your bank's CSV layout and your
# Beancount accounts before using it. Safe to delete if it doesn't apply.
name: "Axis Bank NRO Account"
separator: ","
encoding: "utf-8"
skip_lines_start: 20   # Row 20 contains column headers (Tran Date, CHQNO, PARTICULARS, DR, CR, BAL, SOL)
skip_lines_end: 20     # Footer rows with disclaimers and legends
date_format: "%d-%m-%Y"
decimal_separator: "."
negate_amounts: false
columns:
  date: 1              # Tran Date column
  payee: 3             # PARTICULARS column (contains transaction descriptions/payees)
  amount_debit: 4      # DR column (money out)
  amount_credit: 5     # CR column (money in)
default_account: "Assets:Liquid:Savings:AxisBank:NRO"
default_currency: "INR"
