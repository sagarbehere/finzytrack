# Example CSV import rule shipped with FinzyTrack. Treat every field as a
# starting point — review and adapt to your bank's CSV layout and your
# Beancount accounts before using it. Safe to delete if it doesn't apply.
name: "BofA Savings"
separator: ","
encoding: "utf-8"
skip_lines_start: 7
skip_lines_end: 0
date_format: "%m/%d/%Y"
decimal_separator: "."
negate_amounts: false
columns:
  date: 1
  payee: 2
  amount: 3
default_account: "Assets:Liquid:Savings:BofA"
default_currency: "USD"
