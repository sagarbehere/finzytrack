# Example XLS import rule shipped with FinzyTrack. Treat every field as a
# starting point — review and adapt to your bank's spreadsheet layout and
# your Beancount accounts before using it. Safe to delete if it doesn't apply.
name: "Axis Bank NRO"
sheet_name: "Statement"
skip_lines_start: 18
skip_lines_end: 28
date_format: "%d-%m-%Y"
columns:
  date: 2
  payee: 4
  memo: 3
  amount_debit: 5
  amount_credit: 6
default_account: "Assets:Liquid:Savings:AxisBank:NRO"
default_currency: "INR"
