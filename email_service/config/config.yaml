# Email Service Global Configuration
# IMAP credentials are in per-account YAML files under email_rules/

# Server settings
server:
  host: "127.0.0.1"
  port: 8100

rules_directory: "config/email_rules/"
default_lookback_days: 7
max_emails: 500
parsing_mode: "regex"   # "regex" or "llm"

# LLM settings (only needed when parsing_mode: "llm")
llm:
  api_url: ""       # OpenAI-compatible endpoint
  api_key: ""       # Required for cloud providers, leave empty for local LLMs
  model: ""         # e.g. gpt-4o, llama-3.1-8b
  temperature: 0.1
  max_tokens: 1024
