# Email Service Global Configuration
# IMAP credentials are in per-account YAML files under email_rules/

# Server settings
server:
  host: "127.0.0.1"
  port: 8100

rules_directory: "config/email_rules/"
default_lookback_days: 7
max_emails: 500
parsing_mode: "regex"   # "regex" or "ai"

# AI model settings (only needed when parsing_mode: "ai")
llm:
  provider: "openai"  # "openai" (any OpenAI-compatible endpoint: LM Studio, Ollama, OpenAI, Groq, etc.) or "anthropic" (Anthropic API directly)
  api_url: ""         # Only used when provider=openai — e.g. http://127.0.0.1:1234 or https://api.openai.com
  api_key: ""         # Required for cloud providers (OpenAI, Anthropic, Groq, etc.), leave empty for local LLMs
  model: ""           # e.g. gpt-4o, claude-sonnet-4-6, llama-3.1-8b
  temperature: 0.1
  max_tokens: 1024
