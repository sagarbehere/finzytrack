name: Build Desktop App

on:
  workflow_dispatch:      # Manual trigger from GitHub UI
    inputs:
      platforms:
        description: 'Which platforms to build'
        type: choice
        options:
          - all
          - windows
          - macos
          - linux
        default: all
      make_release:
        description: 'Publish a shareable pre-release with these artifacts'
        type: boolean
        default: false
  push:
    tags:
      - 'v*'             # Auto-build on version tags

permissions:
  contents: write        # Needed to create releases

jobs:
  # Emit the build matrix based on the workflow_dispatch `platforms` input.
  # Tag-triggered runs (and unselected/all) build every platform.
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        shell: bash
        env:
          PLATFORMS: ${{ inputs.platforms }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          MAC='{"os":"macos-latest","name":"macOS","artifact":"Finzytrack.app"}'
          LIN='{"os":"ubuntu-22.04","name":"Linux","artifact":"Finzytrack-x86_64.AppImage"}'
          WIN='{"os":"windows-latest","name":"Windows","artifact":"Finzytrack-windows.zip"}'

          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$PLATFORMS" != "all" && -n "$PLATFORMS" ]]; then
            case "$PLATFORMS" in
              macos)   INCLUDES="$MAC" ;;
              linux)   INCLUDES="$LIN" ;;
              windows) INCLUDES="$WIN" ;;
            esac
          else
            INCLUDES="$MAC,$LIN,$WIN"
          fi
          echo "matrix={\"include\":[$INCLUDES]}" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # -- Install dependencies --

      # Linux apt step must run *before* pip installs because pygobject
      # has no wheels on Linux and builds from source against system
      # headers — libgirepository1.0-dev / libcairo2-dev / pkg-config
      # must be present before `pip install -r desktop/requirements.txt`
      # tries to compile it.

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgirepository1.0-dev \
            libcairo2-dev \
            pkg-config \
            gir1.2-webkit2-4.1 \
            libwebkit2gtk-4.1-0 \
            libfuse2

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install desktop build dependencies
        run: pip install -r desktop/requirements.txt

      # -- Diagnostics: record the .NET runtimes available on Windows
      #    runners. pythonnet picks one of these at startup; differences
      #    between dev boxes and CI here have caused subtle runtime
      #    crashes that are hard to reproduce locally.

      - name: Show .NET runtimes (Windows)
        if: runner.os == 'Windows'
        run: dotnet --list-runtimes
        shell: pwsh
        continue-on-error: true

      # -- Build --

      - name: Build desktop app
        run: python build.py
        working-directory: desktop

      # -- Package platform artifacts --

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        run: |
          cd desktop/dist
          # Zip the .app bundle preserving symlinks
          ditto -c -k --sequesterRsrc --keepParent Finzytrack.app Finzytrack-macOS.zip
        shell: bash

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        run: |
          chmod +x desktop/dist/Finzytrack-x86_64.AppImage
        shell: bash

      # Windows zip is already created by build.py

      # -- Upload artifacts --

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Finzytrack-macOS
          path: desktop/dist/Finzytrack-macOS.zip
          retention-days: 14

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: Finzytrack-Linux
          path: desktop/dist/Finzytrack-x86_64.AppImage
          retention-days: 14

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Finzytrack-Windows
          path: desktop/dist/Finzytrack-windows.zip
          retention-days: 14

  # -- Publish a GitHub Release with the built artifacts.
  #
  # Triggers in two situations:
  #   1. A version tag was pushed (v*) — the formal release path.
  #      Created as a DRAFT so the maintainer reviews the release notes
  #      before publishing. Marked PRERELEASE automatically when the tag
  #      contains a hyphen (semver convention: v1.2.3-beta.1, -rc.2, etc.)
  #      so it doesn't appear as the "latest" release on the website.
  #
  #   2. workflow_dispatch with make_release=true — the "share this
  #      branch build with a tester" path. Tag is auto-generated
  #      (dev-<branch>-<shortsha>), always marked PRERELEASE, and
  #      published immediately (not draft) so the URL is shareable.

  release:
    needs: build
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.make_release)
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            # Strip slashes so the tag name is well-formed
            BRANCH=$(echo "${{ github.ref_name }}" | tr '/' '-')
            TAG="dev-${BRANCH}-${SHORT_SHA}"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "name=Dev build ${TAG}" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.ref_name }}"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "name=${TAG}" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
            # Semver convention: anything with a hyphen is a pre-release
            # (v1.2.3-beta.1, v1.2.3-rc.2, v1.2.3-fix.bug123, ...)
            if [[ "${TAG}" == *-* ]]; then
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          draft: ${{ steps.meta.outputs.draft == 'true' }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            artifacts/Finzytrack-macOS/Finzytrack-macOS.zip
            artifacts/Finzytrack-Linux/Finzytrack-x86_64.AppImage
            artifacts/Finzytrack-Windows/Finzytrack-windows.zip
