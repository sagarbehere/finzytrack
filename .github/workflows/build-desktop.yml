name: Build Desktop App

on:
  workflow_dispatch:      # Manual trigger from GitHub UI
    inputs:
      platforms:
        description: 'Which platforms to build'
        type: choice
        options:
          - all
          - windows
          - macos
          - linux
        default: all
  push:
    tags:
      - 'v*'             # Auto-build on version tags

permissions:
  contents: write        # Needed to create releases

jobs:
  # Emit the build matrix based on the workflow_dispatch `platforms` input.
  # Tag-triggered runs (and unselected/all) build every platform.
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        shell: bash
        env:
          PLATFORMS: ${{ inputs.platforms }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          MAC='{"os":"macos-latest","name":"macOS","artifact":"FinzyTrack.app"}'
          LIN='{"os":"ubuntu-22.04","name":"Linux","artifact":"FinzyTrack-x86_64.AppImage"}'
          WIN='{"os":"windows-latest","name":"Windows","artifact":"FinzyTrack-windows.zip"}'

          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$PLATFORMS" != "all" && -n "$PLATFORMS" ]]; then
            case "$PLATFORMS" in
              macos)   INCLUDES="$MAC" ;;
              linux)   INCLUDES="$LIN" ;;
              windows) INCLUDES="$WIN" ;;
            esac
          else
            INCLUDES="$MAC,$LIN,$WIN"
          fi
          echo "matrix={\"include\":[$INCLUDES]}" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # -- Install dependencies --

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install desktop build dependencies
        run: pip install -r desktop/requirements.txt

      # -- Linux: install system libraries for PyWebView (GTK + WebKit) --

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgirepository1.0-dev \
            libcairo2-dev \
            pkg-config \
            gir1.2-webkit2-4.1 \
            libwebkit2gtk-4.1-0 \
            libfuse2

      # -- Build --

      - name: Build desktop app
        run: python build.py
        working-directory: desktop

      # -- Package platform artifacts --

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        run: |
          cd desktop/dist
          # Zip the .app bundle preserving symlinks
          ditto -c -k --sequesterRsrc --keepParent FinzyTrack.app FinzyTrack-macOS.zip
        shell: bash

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        run: |
          chmod +x desktop/dist/FinzyTrack-x86_64.AppImage
        shell: bash

      # Windows zip is already created by build.py

      # -- Upload artifacts --

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: FinzyTrack-macOS
          path: desktop/dist/FinzyTrack-macOS.zip
          retention-days: 14

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: FinzyTrack-Linux
          path: desktop/dist/FinzyTrack-x86_64.AppImage
          retention-days: 14

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: FinzyTrack-Windows
          path: desktop/dist/FinzyTrack-windows.zip
          retention-days: 14

  # -- Create a GitHub Release when triggered by a version tag --

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/FinzyTrack-macOS/FinzyTrack-macOS.zip
            artifacts/FinzyTrack-Linux/FinzyTrack-x86_64.AppImage
            artifacts/FinzyTrack-Windows/FinzyTrack-windows.zip
